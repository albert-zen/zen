<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Zen Agent</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        --bg: #f6f7f9;
        --panel: #ffffff;
        --panel-soft: #eef2f5;
        --text: #172026;
        --muted: #62717d;
        --line: #d7dee4;
        --accent: #0f766e;
        --accent-strong: #0b5f59;
        --danger: #b42318;
        --warn: #9a6700;
        --code: #26313a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--text);
        background: var(--bg);
      }

      button,
      textarea {
        font: inherit;
      }

      button {
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--panel);
        color: var(--text);
        cursor: pointer;
        height: 36px;
        padding: 0 12px;
      }

      button.primary {
        border-color: var(--accent);
        background: var(--accent);
        color: #fff;
      }

      button.primary:hover {
        background: var(--accent-strong);
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      .app {
        display: grid;
        grid-template-rows: 56px 1fr;
        min-height: 100vh;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        border-bottom: 1px solid var(--line);
        padding: 0 20px;
        background: var(--panel);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }

      .mark {
        display: grid;
        place-items: center;
        width: 28px;
        height: 28px;
        border-radius: 6px;
        background: var(--text);
        color: #fff;
        font-weight: 700;
      }

      .title {
        font-size: 16px;
        font-weight: 700;
        white-space: nowrap;
      }

      .status {
        color: var(--muted);
        font-size: 13px;
        white-space: nowrap;
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(220px, 280px) 1fr;
        min-height: 0;
      }

      .sidebar {
        border-right: 1px solid var(--line);
        background: #fbfcfd;
        padding: 16px;
      }

      .thread-box {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        padding: 12px;
      }

      .thread-label {
        margin: 0 0 4px;
        color: var(--muted);
        font-size: 12px;
        text-transform: uppercase;
      }

      .thread-id {
        overflow-wrap: anywhere;
        font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
        font-size: 13px;
      }

      .thread-meta {
        display: grid;
        gap: 8px;
        margin-top: 12px;
        color: var(--muted);
        font-size: 13px;
      }

      .main {
        display: grid;
        grid-template-rows: auto 1fr;
        min-width: 0;
        min-height: 0;
      }

      .composer {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        border-bottom: 1px solid var(--line);
        padding: 14px 16px;
        background: var(--panel);
      }

      .composer textarea {
        width: 100%;
        min-height: 42px;
        max-height: 140px;
        resize: vertical;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 10px 12px;
        line-height: 1.4;
      }

      .timeline {
        overflow: auto;
        padding: 16px;
      }

      .row {
        display: grid;
        grid-template-columns: 104px minmax(0, 1fr);
        gap: 12px;
        border-bottom: 1px solid var(--line);
        padding: 12px 0;
      }

      .row:first-child {
        padding-top: 0;
      }

      .row-kind {
        color: var(--muted);
        font-size: 12px;
        text-transform: uppercase;
      }

      .row-body {
        min-width: 0;
      }

      .row-text {
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        line-height: 1.45;
      }

      .row-meta {
        margin-top: 6px;
        color: var(--muted);
        font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
        font-size: 12px;
      }

      .tool-box {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        padding: 10px;
      }

      .approval {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 10px;
      }

      .danger {
        color: var(--danger);
      }

      .warn {
        color: var(--warn);
      }

      .empty {
        display: grid;
        place-items: center;
        min-height: 280px;
        color: var(--muted);
      }

      @media (max-width: 760px) {
        .layout {
          grid-template-columns: 1fr;
        }

        .sidebar {
          border-right: 0;
          border-bottom: 1px solid var(--line);
        }

        .composer {
          grid-template-columns: 1fr;
        }

        .row {
          grid-template-columns: 1fr;
          gap: 6px;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="brand">
          <div class="mark">Z</div>
          <div class="title">Zen Agent</div>
        </div>
        <button id="new-thread" type="button">New Thread</button>
      </header>

      <div class="layout">
        <aside class="sidebar">
          <div class="thread-box">
            <p class="thread-label">Thread</p>
            <div id="thread-id" class="thread-id">not started</div>
            <div class="thread-meta">
              <div id="thread-status">status: idle</div>
              <div id="turn-count">turns: 0</div>
              <div id="item-count">items: 0</div>
            </div>
          </div>
        </aside>

        <main class="main">
          <form id="composer" class="composer">
            <textarea
              id="message"
              rows="2"
              autocomplete="off"
              placeholder="Message Zen"
            ></textarea>
            <button class="primary" type="submit">Send</button>
          </form>
          <section id="timeline" class="timeline" aria-live="polite"></section>
        </main>
      </div>
    </div>
    <script type="module" src="./app.js"></script>
  </body>
</html>
